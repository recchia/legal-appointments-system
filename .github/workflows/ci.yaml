name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — typecheck + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: legal
          POSTGRES_PASSWORD: legal
          POSTGRES_DB: legal_appointments_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (api)
        run: pnpm --filter api run lint

      - name: Typecheck (api)
        run: pnpm --filter api run typecheck

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate
        env:
          DATABASE_URL: postgresql://legal:legal@localhost:5432/legal_appointments_test

      - name: Run migrations
        run: pnpm --filter api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://legal:legal@localhost:5432/legal_appointments_test

      - name: Test (api)
        run: pnpm --filter api run test
        env:
          DATABASE_URL: postgresql://legal:legal@localhost:5432/legal_appointments_test

  web:
    name: Web — lint + typecheck + test + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (web)
        run: pnpm --filter web run lint

      - name: Typecheck (web)
        run: pnpm --filter web run typecheck

      - name: Test (web)
        run: pnpm --filter web run test

      - name: Build (web)
        run: pnpm --filter web run build
