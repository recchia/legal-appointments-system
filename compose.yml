services:
  postgres:
    image: postgres:18-alpine
    container_name: legal-appointments-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: legal
      POSTGRES_PASSWORD: legal
      POSTGRES_DB: legal_appointments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal -d legal_appointments"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
